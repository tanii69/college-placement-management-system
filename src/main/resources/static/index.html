<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Students Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f1f5f9;
            font-family:'Segoe UI';
        }

        /* SIDEBAR */
        .sidebar{
            height:100vh;
            width:230px;
            position:fixed;
            background:#0f172a;
            color:white;
            padding:20px;
        }

        .sidebar h4{
            margin-bottom:30px;
        }

        .sidebar a{
            display:block;
            color:#cbd5e1;
            padding:10px;
            text-decoration:none;
            border-radius:6px;
            margin-bottom:8px;
        }

        .sidebar a:hover{
            background:#1e293b;
            color:white;
        }

        /* MAIN */
        .main{
            margin-left:250px;
            padding:20px;
        }

        /* CARD */
        .card-box{
            background:linear-gradient(135deg,#2563eb,#1e40af);
            color:white;
            border-radius:12px;
            padding:20px;
        }

        /* TABLE */
        .table th{
            background:#1f2937;
            color:white;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4>Admin Panel</h4>

    <a href="/admin/admin.html">Dashboard</a>
    <a href="/index.html">Students</a>
    <a href="/admin/companies.html">Companies</a>
    <a href="/admin/applications.html">Applications</a>
    <a href="/admin/interviews.html">Interviews</a>
</div>

<!-- MAIN -->
<div class="main">

    <h3 class="mb-4">Students Management</h3>

    <div class="row">

        <!-- FORM -->
        <div class="col-md-4">
            <div class="card p-3 shadow-sm">

                <h5>Add / Edit Student</h5>

                <input type="text" id="name" class="form-control mb-2" placeholder="Name">
                <input type="text" id="email" class="form-control mb-2" placeholder="Email">
                <input type="text" id="branch" class="form-control mb-2" placeholder="Branch">
                <input type="number" id="cgpa" class="form-control mb-3" placeholder="CGPA">
                <input type="password" id="password" class="form-control mb-3" placeholder="Password">

                <button id="submitBtn" class="btn btn-primary w-100" onclick="addStudent()">
                    Add Student
                </button>

            </div>
        </div>

        <!-- TABLE -->
        <div class="col-md-8">
            <div class="card p-3 shadow-sm">

                <h5>All Students</h5>

                <input type="text" id="searchInput" class="form-control mb-3"
                       placeholder="Search by ID, Name, Email, Branch..."
                       onkeyup="searchStudent()">

                <table class="table table-hover">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Branch</th>
                        <th>CGPA</th>
                        <th>Action</th>
                    </tr>
                    </thead>

                    <tbody id="studentTable"></tbody>
                </table>

                <div id="pagination" class="text-center"></div>

            </div>
        </div>

    </div>

</div>

<script>

    let studentsData = [];
    let filteredData = [];
    let currentPage = 1;
    let rowsPerPage = 10;
    let currentEditId = null;

    /* LOAD STUDENTS */
    function loadStudents(){
        fetch("http://localhost:8080/api/student")
        .then(res=>res.json())
        .then(data=>{
            studentsData = data;
            filteredData = data;
            displayTable();
            setupPagination();
        });
    }

    /* DISPLAY TABLE */
    function displayTable(){

    const table = document.getElementById("studentTable");

    table.innerHTML = "";

    const start = (currentPage - 1) * rowsPerPage;

    const end = start + rowsPerPage;

    const pageData = filteredData.slice(start, end);

    pageData.forEach(s => {

        table.innerHTML += `

        <tr>

            <td>${s.id}</td>

            <td>${s.name || ""}</td>

            <td>${s.email || ""}</td>

            <td>${s.branch || "N/A"}</td>

            <td>${s.cgpa || "-"}</td>

            <td>

                <button class="btn btn-warning btn-sm"
                    onclick='editStudent(
                        ${s.id},
                        ${JSON.stringify(s.name || "")},
                        ${JSON.stringify(s.email || "")},
                        ${JSON.stringify(s.branch || "")},
                        ${s.cgpa || 0}
                    )'>
                    Edit
                </button>

                <button class="btn btn-danger btn-sm"
                    onclick="deleteStudent(${s.id})">
                    Delete
                </button>

            </td>

        </tr>
        `;
    });
}

    /* ADD */
    function addStudent(){

    const student = {
        name: document.getElementById("name").value.trim(),
        email: document.getElementById("email").value.trim(),
        branch: document.getElementById("branch").value.trim(),
        cgpa: document.getElementById("cgpa").value,
        password: document.getElementById("password").value
    };

    if(!student.name){
        alert("Name is required!");
        return;
    }

    fetch("http://localhost:8080/api/student",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(student)
    })
    .then(res => {
        if(!res.ok){
            return res.text().then(msg => { throw new Error(msg); });
        }
    })
    .then(()=>{
        alert("Added!");
        resetForm();
        loadStudents();
    })
    .catch(err=>{
        alert(err.message);
    });
}

    /* EDIT */
    function editStudent(id, nameVal, emailVal, branchVal, cgpaVal){

    document.getElementById("name").value = nameVal;

    document.getElementById("email").value = emailVal;

    document.getElementById("branch").value = branchVal;

    document.getElementById("cgpa").value = cgpaVal;

    document.getElementById("password").value = "";

    currentEditId = id;

    document.getElementById("submitBtn").innerText =
        "Update Student";

    document.getElementById("submitBtn").onclick =
        updateStudent;
}

    /* UPDATE */
    function updateStudent(){

        const student = {
            name: name.value,
            email: email.value,
            branch: branch.value,
            cgpa: cgpa.value,
            password: password.value
        };

        fetch("http://localhost:8080/api/student/"+currentEditId,{
            method:"PUT",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(student)
        })
        .then(()=>{
            alert("Updated!");
            resetForm();
            loadStudents();
        });
    }

    /* DELETE */
    function deleteStudent(id){
        fetch("http://localhost:8080/api/student/"+id,{method:"DELETE"})
        .then(()=>{
            alert("Deleted!");
            loadStudents();
        });
    }

    /* RESET */
    function resetForm(){
        name.value="";
        email.value="";
        branch.value="";
        cgpa.value="";
        password.value="";
        currentEditId=null;

        submitBtn.innerText="Add Student";
        submitBtn.onclick=addStudent;
    }

    /* SEARCH */
    function searchStudent(){

    const val = document.getElementById("searchInput").value.toLowerCase();

    filteredData = studentsData.filter(s =>
        String(s.id).includes(val) ||   // ✅ ID search added
        (s.name || "").toLowerCase().includes(val) ||
        (s.email || "").toLowerCase().includes(val) ||
        (s.branch || "").toLowerCase().includes(val)
    );

    currentPage = 1;
    displayTable();
    setupPagination();
}

    /* PAGINATION */
    function setupPagination(){

        const pages = Math.ceil(filteredData.length / rowsPerPage);
        const container = document.getElementById("pagination");

        container.innerHTML="";

        for(let i=1;i<=pages;i++){
            const btn = document.createElement("button");

            btn.innerText=i;
            btn.className="btn btn-sm m-1 "+(i===currentPage?"btn-primary":"btn-outline-primary");

            btn.onclick=()=>{
                currentPage=i;
                displayTable();
                setupPagination();
            };

            container.appendChild(btn);
        }
    }

    /* INIT */
    loadStudents();

</script>

</body>
</html>
