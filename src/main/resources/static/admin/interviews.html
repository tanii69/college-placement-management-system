<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interview Scheduler</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f1f5f9;
            font-family:'Segoe UI', sans-serif;
        }

        /* SIDEBAR */
        .sidebar{
            width:230px;
            height:100vh;
            position:fixed;
            background:#0f172a;
            color:white;
            padding:20px;
        }

        .sidebar h4{
            margin-bottom:30px;
        }

        .sidebar a{
            display:block;
            color:#cbd5f5;
            padding:10px;
            text-decoration:none;
            border-radius:8px;
            margin-bottom:8px;
        }

        .sidebar a:hover{
            background:#1e293b;
        }

        /* MAIN */
        .main{
            margin-left:250px;
            padding:25px;
        }

        /* CARD */
        .card{
            border:none;
            border-radius:12px;
            box-shadow:0 6px 14px rgba(0,0,0,0.08);
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4>Admin Panel</h4>
    <a href="/admin/admin.html">Dashboard</a>
    <a href="/admin/students.html">Students</a>
    <a href="/admin/companies.html">Companies</a>
    <a href="/admin/applications.html">Applications</a>
    <a href="/admin/interviews.html">Interviews</a>
</div>

<!-- MAIN -->
<div class="main">

    <h3 class="mb-4">📅 Interview Scheduling</h3>

    <div class="row">

        <!-- FORM -->
        <div class="col-md-4">
            <div class="card p-3">

                <h5 id="formTitle">Schedule Interview</h5>

                <select id="studentId" class="form-control mb-2"></select>
                <select id="companyId" class="form-control mb-2"></select>

                <input type="datetime-local" id="date" class="form-control mb-2">

                <select id="mode" class="form-control mb-2">
                    <option value="ONLINE">Online</option>
                    <option value="OFFLINE">Offline</option>
                </select>

                <input type="text" id="link" class="form-control mb-2"
                       placeholder="Meeting Link">

                <input type="text" id="locationLink" class="form-control mb-2"
                       placeholder="Location Link" style="display:none;">

                <button class="btn btn-primary w-100" onclick="saveInterview()">
                    Save
                </button>

            </div>
        </div>

        <!-- TABLE -->
        <div class="col-md-8">
            <div class="card p-3">

                <h5>All Interviews</h5>

                <table class="table table-hover">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Student</th>
                        <th>Company</th>
                        <th>Date</th>
                        <th>Mode</th>
                        <th>Link</th>
                        <th>Action</th>
                    </tr>
                    </thead>

                    <tbody id="table"></tbody>

                </table>

            </div>
        </div>

    </div>
</div>

<script>

    let editId = null;
    const baseUrl = "http://localhost:8080/api/interviews";

    let students = [];
    let companies = [];

    /* INIT */
    async function loadAll(){
        await loadStudents();
        await loadCompanies();
        loadInterviews();
    }

    /* LOAD STUDENTS */
    async function loadStudents(){
        const res = await fetch("http://localhost:8080/api/student");
        students = await res.json();

        const dropdown = document.getElementById("studentId");
        dropdown.innerHTML = "<option value=''>Select Student</option>";

        students.forEach(s=>{
            dropdown.innerHTML += `<option value="${s.id}">${s.name}</option>`;
        });
    }

    /* LOAD COMPANIES */
    async function loadCompanies(){
        const res = await fetch("http://localhost:8080/companies");
        companies = await res.json();

        const dropdown = document.getElementById("companyId");
        dropdown.innerHTML = "<option value=''>Select Company</option>";

        companies.forEach(c=>{
            dropdown.innerHTML += `<option value="${c.id}">${c.companyName}</option>`;
        });
    }

    /* MODE SWITCH */
    document.getElementById("mode").addEventListener("change", function(){

        const linkField = document.getElementById("link");
        const locationField = document.getElementById("locationLink");

        if(this.value === "ONLINE"){
            linkField.style.display = "block";
            locationField.style.display = "none";
            locationField.value = "";
        } else {
            linkField.style.display = "none";
            linkField.value = "";
            locationField.style.display = "block";
        }
    });

    /* LOAD INTERVIEWS */
    async function loadInterviews(){
        const res = await fetch(baseUrl);
        const data = await res.json();

        const table = document.getElementById("table");
        table.innerHTML = "";

        data.forEach(i=>{
            table.innerHTML += `
            <tr>
                <td>${i.id}</td>
                <td>${getStudentName(i.studentId)}</td>
                <td>${getCompanyName(i.companyId)}</td>
                <td>${new Date(i.interviewDate).toLocaleString()}</td>
                <td>${i.mode}</td>
                <td>
                    <a href="${i.link}" target="_blank" class="btn btn-sm btn-success">
                        Open
                    </a>
                </td>
                <td>
                    <button class="btn btn-warning btn-sm" onclick="editInterview(${i.id})">Edit</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteInterview(${i.id})">Delete</button>
                </td>
            </tr>`;
        });
    }

    /* HELPERS */
    function getStudentName(id){
        const s = students.find(x=>x.id==id);
        return s ? s.name : id;
    }

    function getCompanyName(id){
        const c = companies.find(x=>x.id==id);
        return c ? c.companyName : id;
    }

    /* SAVE */
    async function saveInterview(){

        const mode = document.getElementById("mode").value;

        let linkValue = "";

        if(mode === "ONLINE"){
            linkValue = document.getElementById("link").value.trim();
            if(!linkValue){
                alert("Enter meeting link");
                return;
            }
        } else {
            linkValue = document.getElementById("locationLink").value.trim();
            if(!linkValue){
                alert("Enter location link");
                return;
            }
        }

        const data = {
            studentId: Number(document.getElementById("studentId").value),
            companyId: Number(document.getElementById("companyId").value),
            interviewDate: document.getElementById("date").value,
            mode: mode,
            link: linkValue
        };

        if(editId){
            await fetch(`${baseUrl}/${editId}`,{
                method:"PUT",
                headers:{"Content-Type":"application/json"},
                body: JSON.stringify(data)
            });
            alert("Updated!");
        } else {
            await fetch(baseUrl,{
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body: JSON.stringify(data)
            });
            alert("Scheduled!");
        }

        clearForm();
        loadInterviews();
    }

    /* EDIT */
    async function editInterview(id){
        const res = await fetch(baseUrl);
        const data = await res.json();

        const i = data.find(x=>x.id===id);

        editId = id;

        document.getElementById("studentId").value = i.studentId;
        document.getElementById("companyId").value = i.companyId;
        document.getElementById("date").value = i.interviewDate;
        document.getElementById("mode").value = i.mode;

        document.getElementById("mode").dispatchEvent(new Event("change"));

        if(i.mode === "ONLINE"){
            document.getElementById("link").value = i.link;
        } else {
            document.getElementById("locationLink").value = i.link;
        }

        window.scrollTo({top:0, behavior:"smooth"});
    }

    /* DELETE */
    async function deleteInterview(id){
        if(confirm("Delete interview?")){
            await fetch(`${baseUrl}/${id}`,{method:"DELETE"});
            loadInterviews();
        }
    }

    /* CLEAR */
    function clearForm(){
        editId = null;
        document.getElementById("studentId").value="";
        document.getElementById("companyId").value="";
        document.getElementById("date").value="";
        document.getElementById("link").value="";
        document.getElementById("locationLink").value="";
        document.getElementById("mode").value="ONLINE";
    }

    /* INIT */
    loadAll();

</script>

</body>
</html>
